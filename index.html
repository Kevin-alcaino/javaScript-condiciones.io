    <h1>Condiciones HTML.</h1>
    
   <!-- Ejercicio Clicks -->

    <div class="click">
    <section class="section1">
     <img class="img1" src="assets/img/gato volador.jpg" alt="gato volador" onclick="
        let borde = document.querySelector('img');
        if (borde.style.border){
            borde.style.border = ''
        } else {borde.style.border = '5px solid blue';}"
    </section>

    <!-- Ejercicio Stickers -->

    <div class="stickers">
     <section>
    <div>
    <img class="img" src="assets/img/sticker 1.jpg" alt="">
    <input type="number" id="sticker1" value="0"> 
    </div>
   
    <div>
    <img class="img" src="assets/img/stickers 2.png" alt="">
    <input type="number" id="sticker2" value="0">
    </div>
    
    <div>
    <img class="img" src="assets/img/stickers 3.jpg" alt="">
    <input type="number" id="sticker3" value="0">
    </div>
    </section>

    <div class="resultado">
        <button id="calcular" onclick="
            const total = Number(document.querySelector('#sticker1').value) + 
                          Number(document.querySelector('#sticker2').value) + 
                          Number(document.querySelector('#sticker3').value);
            
            if (total <= 10) {
                document.querySelector('#resultado').textContent = `llevas ${total} stickers`;
            } else {
                document.querySelector('#resultado').textContent = 'llevas demasiados stickers';
            }
        ">Calcular</button>
        
        <p id="resultado"></p>
    </div>
   </div>
