<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/stickers.css">
    <title>Stickers</title>
</head>
<body>
    <section>
    <div>
    <img src="assets/img/sticker 1.jpg" alt="">
    <input type="number" id="sticker1" value="0"> 
    </div>
   
    <div>
    <img src="assets/img/stickers 2.png" alt="">
    <input type="number" id="sticker2" value="0">
    </div>
    
    <div>
    <img src="assets/img/stickers 3.jpg" alt="">
    <input type="number" id="sticker3" value="0">
    </div>
    </section>

    <div class="resultado">
        <button id="calcular" onclick="
            const total = Number(document.querySelector('#sticker1').value) + 
                          Number(document.querySelector('#sticker2').value) + 
                          Number(document.querySelector('#sticker3').value);
            
            if (total <= 10) {
                document.querySelector('#resultado').textContent = `llevas ${total} stickers`;
            } else {
                document.querySelector('#resultado').textContent = 'llevas demasiados stickers';
            }
        ">Calcular</button>
        
        <p id="resultado"></p>
    </div>

 <script src="assets/javaScript/stickers.js"></script>
</body>
</html>
